# 1. Configuración Global
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 2. Definición del Backend (Upstream)
    # Aquí apuntamos a tu aplicación Quarkus
    upstream quarkus_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        # Escuchamos en el puerto 80 (ngrok redirigirá aquí)
        listen 80;
        server_name localhost;

        # 3. Logs de Monitoreo
        access_log logs/chat_access.log;
        error_log logs/chat_error.log;

        # 4. Configuración del WebSocket (/chat)
        location /chat {
            # Redirige el tráfico al upstream definido arriba
            proxy_pass http://quarkus_backend;

            # Protocolo Upgrade (Crucial para WebSockets)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Pasando información real del cliente al backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 5. Tiempos de espera (Timeouts)
            # Evita que la conexión se cierre por inactividad del chat
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # 6. Seguridad de Origen (CORS)
            # Solo permite conexiones desde localhost o tu URL de ngrok
            if ($http_origin !~* (http://localhost|https://uneffaced-nonregimented-karlie.ngrok-free.dev)) {
                return 403;
            }
        }

        # 7. Servir el Frontend (Archivos estáticos)
        location / {
            root   html;
            index  index.html index.htm;
            # Útil si usas frameworks como React/Angular/Vue
            try_files $uri $uri/ /index.html;
        }

        # Bloquear acceso a archivos sensibles
        location ~ /\.ht {
            deny  all;
        }
    }
}