<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Websocket Chat Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Bienvenido al Chat</h2>
            <input type="text" id="username-input" placeholder="Tu alias...">
            <button onclick="connect()">Conectar</button>
        </div>
    </div>

    <div id="chat-screen" class="hidden">
        <aside class="sidebar">
            <h3>Conectados</h3>
            <div id="user-list">
            </div>
        </aside>

        <main class="chat-area">
            <header>
                <span id="current-target-label">Mensaje para: <strong>Todos</strong></span>
                <button id="reset-target" onclick="setTarget('all')">Limpiar selección</button>
            </header>

            <div id="messages-container"></div>

            <div class="input-group">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
                <button id="send-btn">Enviar</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
